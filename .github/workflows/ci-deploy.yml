name: CI Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set lowercase repo
        id: set-vars
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.set-vars.outputs.image_name }}:latest
            ghcr.io/${{ steps.set-vars.outputs.image_name }}:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          rm: true
          source: 'docker-compose.prod.yml,.env.production.encrypted,.sops.yaml'
          target: '/containers/${{ github.repository }}/'

      - name: Pull image and start
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -euo pipefail

            export SOPS_AGE_KEY_FILE="/etc/sops/age/key.txt"

            if [ ! -f "$SOPS_AGE_KEY_FILE" ]; then
              echo "SOPS age key file not found at $SOPS_AGE_KEY_FILE"
              exit 1
            fi

            cd "/containers/${{ github.repository }}"

            if ! command -v sops >/dev/null 2>&1; then
              echo "sops is not installed on the server"
              exit 1
            fi

            # Decrypt production env
            sops --decrypt --input-type dotenv --output-type dotenv .env.production.encrypted > .env

            chmod 600 .env

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
